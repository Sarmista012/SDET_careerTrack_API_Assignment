[api]
scheme = https
host = restful-booker.herokuapp.com

[endpoints]
create_token = /auth
create_booking = /booking

[methods]
create_token = POST
create_booking = POST

[headers]
content_type = application/json

[auth]
username = admin
password = password123

[response_keys]
create_token_token_key = token

[expected_status]
create_token = 200

[pytest]
log_cli = true
log_file = logs/test_run.log
log_file_level = INFO
log_file_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
addopts = -ra